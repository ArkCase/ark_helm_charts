{{- if and (include "arkcase.subsystem.enabled" $) (not (include "arkcase.subsystem.external" $)) }}
apiVersion: v1
kind: Pod
metadata:
  name: {{ printf "%s-test" (include "arkcase.fullname" $) | quote }}
  namespace: {{ $.Release.Namespace | quote }}
  labels: {{- include "arkcase.labels" $ | nindent 4 }}
    {{- include "arkcase.labels.test.smoke" $ | nindent 4 }}
    {{- with ($.Values.labels).common }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with ($.Values.test).labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: hook-succeeded
    {{- with ($.Values.annotations).common }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with ($.Values.test).annotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- include "arkcase.image.pullSecrets" $ | nindent 2 }}
  containers:
    - name: test
      {{- include "arkcase.image" (dict "ctx" $ "name" "smoke-test" "repository" "arkcase/nettest") | nindent 6 }}
      command: [ "/usr/local/bin/run-from-env" ]
      args: [ "SCRIPT" ]
      env: {{- include "arkcase.tools.baseEnv" $ | nindent 8 }}
        {{- include "arkcase.acme.env" $ | nindent 8 }}
        - name: SERVICE_NAME
          value: {{ include "arkcase.service.name" $ | quote }}
        - name: ARTEMIS_CONSOLE_URL
          value: "https://$(SERVICE_NAME):8443/console"
        - name: ARTEMIS_BASE_URL
          value: "ssl://$(SERVICE_NAME)"
        - name: ARTEMIS_AMQP_URL
          value: "$(ARTEMIS_BASE_URL):61616"
        - name: ARTEMIS_STOMP_URL
          value: "$(ARTEMIS_BASE_URL):61613"
        - name: SCRIPT
          value: |-
            set -xeuo pipefail
            . /.functions
            init_ssl
            curl -fsSL -m 3 -o /dev/null "$(ARTEMIS_CONSOLE_URL)"
            AMQP="$(ARTEMIS_AMQP_URL)"
            [[ "${AMQP}" =~ ^ssl://(.*) ]] && AMQP="${BASH_REMATCH[1]}"
            timeout 3 openssl s_client -connect "${AMQP}" -verify_quiet -verify_return_error -showcerts </dev/null
            STOMP="$(ARTEMIS_STOMP_URL)"
            [[ "${STOMP}" =~ ^ssl://(.*) ]] && STOMP="${BASH_REMATCH[1]}"
            timeout 3 openssl s_client -connect "${STOMP}" -verify_quiet -verify_return_error -showcerts </dev/null
  restartPolicy: Never
{{- end -}}
